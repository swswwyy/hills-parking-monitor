name: Hills Parking Push

on:
  schedule:
        # - cron: '0 19 * * 1-5'  # 夏令时 AEDT(UTC+11) 06:00，10月~4月启用
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

jobs:
  push-parking:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
      - name: Run parking monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 hills_parking_push.py
